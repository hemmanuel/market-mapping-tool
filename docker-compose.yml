version: '3.8'

services:
  # PostgreSQL with pgvector for Relational + Vector storage
  postgres:
    image: ankane/pgvector:latest
    container_name: market_postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: market_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Neo4j for Graph storage
  neo4j:
    image: neo4j:5.18.0
    container_name: market_neo4j
    environment:
      NEO4J_AUTH: neo4j/password
      # Enable APOC plugins for advanced graph algorithms
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_apoc_import_file_use__neo4j__config: "true"
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
    ports:
      - "7474:7474" # HTTP browser
      - "7687:7687" # Bolt protocol
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

  # pgAdmin4 for PostgreSQL Database Viewing
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: market_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped

  # MinIO for Object Storage
  minio:
    image: minio/minio:latest
    container_name: market_minio
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  # vLLM for Local Inference (Offline Batch Worker)
  gpu_worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: market_gpu_worker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    env_file:
      - .env
    environment:
      - POSTGRES_URL=postgresql+asyncpg://user:password@postgres:5432/market_db
      - NEO4J_URI=bolt://neo4j:7687
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  postgres_data:
  neo4j_data:
  minio_data:
